<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>سهل — نظام ERP</title>
  <script>
    // SPA redirect for GitHub Pages
    // Save the current path to sessionStorage and redirect to index
    const path = window.location.pathname;
    const base = '/sahl-react/';
    if (path.startsWith(base)) {
      const route = path.slice(base.length);
      sessionStorage.setItem('gh-pages-route', route + window.location.search + window.location.hash);
    }
    window.location.replace(base);
  </script>
</head>
<body>

</body>
</html>
